name: it-installs

on:
  push:
    branches: [main]
    tags: ["*-v*"]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # tags needed for the semver monotonic check

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Structural validation (claude plugin validate --strict)
        run: bash scripts/validate-all.sh

      - name: Skill frontmatter + CTA + version lint
        run: node scripts/lint-skills.mjs

      - name: Curation guard (private-layer denylist)
        run: bash scripts/curation-guard.sh
